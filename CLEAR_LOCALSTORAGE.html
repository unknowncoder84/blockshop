<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear BlockShop Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .success {
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            display: none;
        }
        .info {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            color: #374151;
        }
        .warning {
            background: #fef3c7;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Clear BlockShop Data</h1>
        
        <div class="warning">
            <strong>⚠️ Warning:</strong> This will delete all your local data including users, orders, products, and reviews. This action cannot be undone!
        </div>

        <div class="info">
            <strong>What will be cleared:</strong>
            <ul>
                <li>All user accounts</li>
                <li>All orders</li>
                <li>All products</li>
                <li>All reviews</li>
                <li>Current login session</li>
            </ul>
        </div>

        <button onclick="clearAllData()">🗑️ Clear All Data</button>
        <button onclick="clearUsersOnly()">👤 Clear Users Only</button>
        <button onclick="viewData()">👁️ View Current Data</button>

        <div id="success" class="success"></div>
        <div id="dataView" style="margin-top: 20px;"></div>
    </div>

    <script>
        function clearAllData() {
            if (confirm('Are you sure you want to clear ALL data? This cannot be undone!')) {
                localStorage.removeItem('w3mart_users');
                localStorage.removeItem('w3mart_orders');
                localStorage.removeItem('w3mart_seller_products');
                localStorage.removeItem('w3mart_reviews');
                localStorage.removeItem('blockshop_user');
                localStorage.removeItem('blockshop_admin');
                localStorage.removeItem('REACT_APP_DEMO_MODE');
                
                showSuccess('✅ All data cleared! You can now signup with any email.');
                setTimeout(() => {
                    window.location.href = 'http://localhost:3000/signup';
                }, 2000);
            }
        }

        function clearUsersOnly() {
            if (confirm('Clear all user accounts? You will need to signup again.')) {
                localStorage.removeItem('w3mart_users');
                localStorage.removeItem('blockshop_user');
                
                showSuccess('✅ All users cleared! You can now signup fresh.');
                setTimeout(() => {
                    window.location.href = 'http://localhost:3000/signup';
                }, 2000);
            }
        }

        function viewData() {
            const users = JSON.parse(localStorage.getItem('w3mart_users') || '[]');
            const orders = JSON.parse(localStorage.getItem('w3mart_orders') || '[]');
            const products = JSON.parse(localStorage.getItem('w3mart_seller_products') || '[]');
            const reviews = JSON.parse(localStorage.getItem('w3mart_reviews') || '[]');
            
            const dataView = document.getElementById('dataView');
            dataView.innerHTML = `
                <div class="info">
                    <h3>Current Data:</h3>
                    <ul>
                        <li><strong>Users:</strong> ${users.length}</li>
                        <li><strong>Orders:</strong> ${orders.length}</li>
                        <li><strong>Products:</strong> ${products.length}</li>
                        <li><strong>Reviews:</strong> ${reviews.length}</li>
                    </ul>
                    ${users.length > 0 ? `
                        <h4>Registered Users:</h4>
                        <ul>
                            ${users.map(u => `<li>${u.email} (${u.role})</li>`).join('')}
                        </ul>
                    ` : '<p><em>No users registered</em></p>'}
                </div>
            `;
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        // Auto-view data on load
        viewData();
    </script>
</body>
</html>
